# SonarCloud project configuration for api-gateway
# Replace ravdy with your actual SonarCloud organization key
sonar.projectKey=ravdy_api-gateway
sonar.organization=ravdy
sonar.projectName=API Gateway

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# JaCoCo XML report — generated by 'mvn test jacoco:report'
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Checkstyle report — generated by 'mvn checkstyle:check'
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml

sonar.sourceEncoding=UTF-8

# Exclude boilerplate that doesn't need coverage analysis
sonar.exclusions=**/generated-sources/**,**/target/**
sonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/dto/**,**/model/**
