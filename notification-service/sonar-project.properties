# SonarCloud project configuration for notification-service (Node.js)
sonar.projectKey=ravdy_notification-service
sonar.organization=ravdy
sonar.projectName=Notification Service

sonar.sources=src
sonar.tests=src/tests
sonar.test.inclusions=src/tests/**/*.test.js

# Jest LCOV coverage report — generated by 'npm test -- --coverage'
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

sonar.exclusions=node_modules/**,coverage/**
sonar.coverage.exclusions=src/tests/**
