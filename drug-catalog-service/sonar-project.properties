# SonarCloud project configuration for drug-catalog-service
sonar.projectKey=ravdy_drug-catalog-service
sonar.organization=ravdy
sonar.projectName=Drug Catalog Service

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
