# SonarCloud project configuration for auth-service
sonar.projectKey=ravdy_auth-service
sonar.organization=ravdy
sonar.projectName=Auth Service

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml

sonar.sourceEncoding=UTF-8

sonar.exclusions=**/generated-sources/**,**/target/**
# Exclude DTOs, entities, and config from coverage requirement — focus on service/controller logic
sonar.coverage.exclusions=**/*Application.java,**/*Config.java,**/dto/**,**/model/**,**/entity/**,**/*Request.java,**/*Response.java
